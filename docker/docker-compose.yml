# ===========================================================================
# VIDYUT — full stack: API + Dashboard + Redis + Postgres (audit/metrics)
# ===========================================================================


services:
  redis:
    image: redis:7.2-alpine
    container_name: vidyut-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vidyut-net

  postgres:
    image: postgres:15-alpine
    container_name: vidyut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vidyut
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidyut_pw_change_me}
      POSTGRES_DB: vidyut
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vidyut" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vidyut-net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: vidyut-api:latest
    container_name: vidyut-api
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      CACHE_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VIDYUT_API_KEY: ${VIDYUT_API_KEY:-}
      RATE_LIMIT_RPM: "120"
      CORS_ORIGINS: "*"
      MODEL_VERSION: ${MODEL_VERSION:-LATEST}
      MODELS_ROOT: /app/data/models
      AUDIT_DB_PATH: /app/data/audit/vidyut_audit.db
      VIDYUT_DB_PATH: /app/data/vidyut.db
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vidyut-net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vidyut-app:latest
    container_name: vidyut-dashboard
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
      VIDYUT_API_URL: http://api:8000
      MODEL_VERSION: ${MODEL_VERSION:-LATEST}
      CACHE_ENABLED: "true"
      REDIS_HOST: redis
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vidyut-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vidyut-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - vidyut-net
    profiles: [ "dev" ]

volumes:
  redis_data:
  postgres_data:

networks:
  vidyut-net:
    driver: bridge
